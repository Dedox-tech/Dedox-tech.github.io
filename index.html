<!doctype html>

<html lang="en">

  <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <script src="https://unpkg.com/mathjs/lib/browser/math.js"></script>

    <title> Online Calculator </title>

  </head>

  <body>

    <section class = "d-flex align-items-center min-vh-100 text-center">

        <div class="container text-center mb-3 custom-margin-sides bg-dark text-white">
            
            <div class = "row custom-background-h1 text-center">

                <h1 class = "lead mx-auto custom-text-h1"> Online Calculator </h1>

            </div>

            <div class="row border-top">

                <div class = "col-12 border">

                    <div class = "text-right" id = "result">  </div>

                </div>

            </div>

            <div class="row">
                
                <div class = "col-6 border bg-danger">

                    <div id = "restart-button"> AC </div>

                </div>

                <div class = "col-3 border custom-button bg-success">

                    <div> / </div>

                </div>

                <div class = "col-3 border custom-button bg-success">

                    <div> * </div>

                </div>
                
            </div>

            <div class="row">

                <div class = "col-3 border custom-button">

                    <div> 7 </div>

                </div>

                <div class = "col-3 border custom-button">

                    <div> 8 </div>

                </div>

                <div class = "col-3 border custom-button">

                    <div> 9 </div>

                </div>
                
                <div class = "col-3 border custom-button bg-success">

                    <div> - </div>

                </div>

                
            </div>

            <div class="row">

                <div class = "col-3 border custom-button">

                    <div> 4 </div>

                </div>

                <div class = "col-3 border custom-button">

                    <div> 5 </div>

                </div>

                <div class = "col-3 border custom-button">

                    <div> 6 </div>

                </div>
                
                <div class = "col-3 border custom-button bg-success">

                    <div> + </div>

                </div>
                
                
            </div>



            <div class="row">

                <div class = "col-3 border custom-button">

                    <div> 1 </div>

                </div>

                <div class = "col-3 border custom-button">

                    <div> 2 </div>

                </div>

                <div class = "col-3 border custom-button">

                    <div> 3 </div>

                </div>

                <div class = "col-3 border">

                    <div> N/D </div>

                </div>

            </div>
            


            <div class="row">

                <div class = "col-6 border custom-button">

                    <div> 0 </div>

                </div>

                <div class = "col-3 border custom-button">

                    <div> . </div>

                </div>

                <div class = "col-3 border bg-info">

                    <div id="fire-event"> = </div>

                </div>

            </div>
            

            <div class = "row custom-background-p text-center">

                <p class = "lead mx-auto custom-text-p mt-3"> Designed and Coded by Dieguitosclub </p>

            </div>


        </div>

    </section>


    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns" crossorigin="anonymous"></script>
    <script src="calculadora-script.js"></script>

</body>

</html>
